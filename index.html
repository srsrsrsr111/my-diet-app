    // ==================== Helper Functions ====================
    function calculateBMR(profile) {
        const { weight, height, age, gender } = profile;
        if (gender === 'male') return 10 * weight + 6.25 * height - 5 * age + 5;
        if (gender === 'female') return 10 * weight + 6.25 * height - 5 * age - 161;
        return 10 * weight + 6.25 * height - 5 * age - 78;
    }

    function calculateTDEE(profile) {
        const bmr = calculateBMR(profile);
        const multipliers = { sedentary: 1.2, light: 1.375, moderate: 1.55, active: 1.725, veryActive: 1.9 };
        let tdee = bmr * (multipliers[profile.activityLevel] || 1.55);
        if (profile.goal === 'lose') tdee -= 500;
        if (profile.goal === 'gain') tdee += 400;
        return Math.round(tdee);
    }

    function calculateMacros(calories) {
        return {
            protein: Math.round((calories * 0.3) / 4),
            fat: Math.round((calories * 0.25) / 9),
            carbs: Math.round((calories * 0.45) / 4),
        };
    }

    function calculateCarbLimit(profile) {
        const tdee = calculateTDEE(profile);
        return Math.round((tdee * 0.35) / 4);
    }

    function getGreeting(t) {
        const h = new Date().getHours();
        if (h < 12) return t.goodMorning;
        if (h < 18) return t.goodAfternoon;
        return t.goodEvening;
    }

    function getDateKey(date) {

    // ==================== Progress Ring Component ====================
    function ProgressRing({ progress, size = 160, strokeWidth = 12, color = "#D7FE63", bgColor = "#E5E7EB", children }) {
        const radius = (size - strokeWidth) / 2;
        const circumference = 2 * Math.PI * radius;
        const clampedProgress = Math.min(Math.max(progress, 0), 100);
        const offset = circumference - (clampedProgress / 100) * circumference;

        return (
            <div className="relative inline-flex items-center justify-center" style={{ width: size, height: size }}>
                <svg width={size} height={size} className="transform -rotate-90">
                    <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={bgColor} strokeWidth={strokeWidth} />
                    <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color}
                        strokeWidth={strokeWidth} strokeLinecap="round"
                        strokeDasharray={circumference} strokeDashoffset={offset}
                        className="progress-ring-circle" style={{ animation: 'ringProgress 1s ease-out' }} />
                </svg>
                <div className="absolute inset-0 flex items-center justify-center">{children}</div>
            </div>
        );
    }

    // ==================== Swipeable Item ====================
    function SwipeableItem({ children, onDelete }) {
        const ref = useRef(null);
        const startX = useRef(0);
        const currentX = useRef(0);
        const [offset, setOffset] = useState(0);
        const [showDelete, setShowDelete] = useState(false);

        const handleTouchStart = (e) => {
            startX.current = e.touches[0].clientX;
            currentX.current = 0;
        };

        const handleTouchMove = (e) => {
            const diff = e.touches[0].clientX - startX.current;
            if (diff < 0) {
                currentX.current = diff;
                setOffset(Math.max(diff, -80));
            }
        };

        const handleTouchEnd = () => {
            if (currentX.current < -40) {
                setOffset(-80);
                setShowDelete(true);
            } else {
                setOffset(0);
                setShowDelete(false);
            }
        };

        return (
            <div className="relative overflow-hidden rounded-2xl mb-3">
                {showDelete && (
                    <div className="absolute right-0 top-0 bottom-0 w-20 bg-red-500 flex items-center justify-center rounded-r-2xl cursor-pointer btn-press"
                        onClick={() => { onDelete(); setOffset(0); setShowDelete(false); }}>
                        <i className="fa-solid fa-trash text-white text-lg"></i>
                    </div>
                )}
                <div ref={ref} className="swipe-item relative z-10"
                    style={{ transform: `translateX(${offset}px)` }}
                    onTouchStart={handleTouchStart}
                    onTouchMove={handleTouchMove}
                    onTouchEnd={handleTouchEnd}>
                    {children}
                </div>
            </div>
        );
    }

    // ==================== Dashboard Screen ====================
    function DashboardScreen() {
        const { profile, foodLog, selectedDate, lang } = useContext(AppContext);
        const t = translations[lang];
        const tdee = calculateTDEE(profile);
        const macros = calculateMacros(tdee);
        const carbLimit = profile.dietMode === 'carbControl' ? calculateCarbLimit(profile) : macros.carbs;

        const dateKey = getDateKey(selectedDate);
        const todayFoods = foodLog[dateKey] || [];

        const totals = todayFoods.reduce((acc, item) => ({
            calories: acc.calories + Math.round(item.food.calories * item.food.serving / 100),
            protein: acc.protein + Math.round(item.food.protein * item.food.serving / 100),
            fat: acc.fat + Math.round(item.food.fat * item.food.serving / 100),
            carbs: acc.carbs + Math.round(item.food.carbs * item.food.serving / 100),
        }), { calories: 0, protein: 0, fat: 0, carbs: 0 });

        const calProgress = Math.min((totals.calories / tdee) * 100, 100);
        const carbProgress = Math.min((totals.carbs / carbLimit) * 100, 100);
        const remaining = Math.max(tdee - totals.calories, 0);

        return (
            <div className="animate-fadeIn">
                <div className="mb-6">
                    <h1 className="text-2xl font-bold text-gray-900">{getGreeting(t)}, {profile.name} 👋</h1>
                    <p className="text-gray-400 text-sm mt-1">{t.letsTrack}</p>
                </div>

                {/* Calorie Ring */}
                <div className="bg-white rounded-3xl p-6 shadow-sm mb-4 animate-fadeIn stagger-1">
                    <div className="flex items-center justify-between">
                        <div>
                            <div className="text-sm text-gray-400 mb-1">{t.calories}</div>
                            <div className="text-4xl font-bold text-gray-900">{totals.calories}</div>
                            <div className="text-sm text-gray-400">{t.of} {tdee} {t.kcal}</div>
                            <div className="mt-2 text-sm font-medium text-green-500">
                                {remaining} {t.kcal} {t.remaining}
                            </div>
                        </div>
                        <ProgressRing progress={calProgress} size={130} strokeWidth={14}>
                            <div className="text-center">
                                <div className="text-2xl font-bold text-gray-900">{Math.round(calProgress)}%</div>
                            </div>
                        </ProgressRing>
                    </div>
                </div>

                {/* Diabetes Widget */}
                {profile.dietMode === 'carbControl' && (
                    <div className="bg-[#D1F0ED] rounded-3xl p-5 mb-4 animate-fadeIn stagger-2">
                        <div className="flex items-center justify-between mb-3">
                            <div className="flex items-center gap-2">
                                <span className="text-xl">🩺</span>
                                <span className="font-bold text-gray-900">{t.carbsConsumed}</span>
                            </div>
                            <span className={`text-sm font-bold px-3 py-1 rounded-full ${
                                carbProgress > 90 ? 'bg-red-100 text-red-600' : carbProgress > 70 ? 'bg-yellow-100 text-yellow-600' : 'bg-green-100 text-green-600'
                            }`}>
                                {totals.carbs}{t.g} / {carbLimit}{t.g}
                            </span>
                        </div>
                        <div className="h-3 bg-white/60 rounded-full overflow-hidden">
                            <div className={`h-full rounded-full transition-all duration-700 ${
                                carbProgress > 90 ? 'bg-red-400' : carbProgress > 70 ? 'bg-yellow-400' : 'bg-teal-500'
                            }`} style={{ width: `${carbProgress}%` }} />
                        </div>
                        <div className="text-xs text-teal-700 mt-2 font-medium">
                            {t.dailyCarbLimit}: {carbLimit}{t.g}
                        </div>
                    </div>
                )}

                {/* Macro Grid */}
                <div className="grid grid-cols-3 gap-3 animate-fadeIn stagger-3">
                    {[
                        { label: t.protein, value: totals.protein, max: macros.protein, color: 'bg-blue-500', bg: 'bg-blue-50', textColor: 'text-blue-500' },
                        { label: t.fat, value: totals.fat, max: macros.fat, color: 'bg-yellow-500', bg: 'bg-yellow-50', textColor: 'text-yellow-500' },
                        { label: t.carbs, value: totals.carbs, max: profile.dietMode === 'carbControl' ? carbLimit : macros.carbs, color: 'bg-green-500', bg: 'bg-green-50', textColor: 'text-green-500' },
                    ].map(m => (
                        <div key={m.label} className={`${m.bg} rounded-2xl p-4`}>
                            <div className={`text-xs font-medium ${m.textColor} mb-1`}>{m.label}</div>
                            <div className="text-xl font-bold text-gray-900">{m.value}<span className="text-xs text-gray-400">{t.g}</span></div>
                            <div className="h-1.5 bg-white/60 rounded-full mt-2 overflow-hidden">
                                <div className={`h-full ${m.color} rounded-full transition-all duration-500`}
                                    style={{ width: `${Math.min((m.value / m.max) * 100, 100)}%` }} />
                            </div>
                            <div className="text-xs text-gray-400 mt-1">{t.of} {m.max}{t.g}</div>
                        </div>
                    ))}
                </div>
            </div>
        );
    }

    // ==================== Tracker Screen ====================
    function TrackerScreen() {
        const { profile, foodLog, setFoodLog, selectedDate, setSelectedDate, lang } = useContext(AppContext);
        const t = translations[lang];
        const [showSearch, setShowSearch] = useState(false);
        const carbLimit = profile.dietMode === 'carbControl' ? calculateCarbLimit(profile) : null;

        // Week calendar
        const today = new Date();
        const weekDates = [];
        const dayOfWeek = today.getDay();
        const monday = new Date(today);
        monday.setDate(today.getDate() - ((dayOfWeek + 6) % 7));
        for (let i = 0; i < 7; i++) {
            const d = new Date(monday);
            d.setDate(monday.getDate() + i);
            weekDates.push(d);
        }

        const dateKey = getDateKey(selectedDate);
        const todayFoods = foodLog[dateKey] || [];

        const addFood = (food) => {
            const newLog = { ...foodLog };
            if (!newLog[dateKey]) newLog[dateKey] = [];
            newLog[dateKey] = [...newLog[dateKey], { id: Date.now(), food, addedAt: new Date().toISOString() }];
            setFoodLog(newLog);
        };

        const removeFood = (itemId) => {
            const newLog = { ...foodLog };
            newLog[dateKey] = (newLog[dateKey] || []).filter(item => item.id !== itemId);
            setFoodLog(newLog);
        };

        return (
            <div className="animate-fadeIn">
                <div className="flex items-center justify-between mb-5">
                    <h1 className="text-2xl font-bold text-gray-900">{t.tracker}</h1>
                    <button onClick={() => setShowSearch(true)}
                        className="w-12 h-12 bg-[#D7FE63] rounded-2xl flex items-center justify-center shadow-md btn-press hover:bg-[#c5ec4e] transition-colors">
                        <i className="fa-solid fa-plus text-gray-900 text-lg"></i>
                    </button>
                </div>

                {/* Week Calendar */}
                <div className="flex gap-2 mb-6 overflow-x-auto hide-scrollbar pb-1">
                    {weekDates.map((d, i) => {
                        const isSelected = getDateKey(d) === getDateKey(selectedDate);
                        const isToday = getDateKey(d) === getDateKey(today);
                        return (
                            <button key={i} onClick={() => setSelectedDate(new Date(d))}
                                className={`flex-shrink-0 w-12 py-3 rounded-2xl flex flex-col items-center gap-1 btn-press transition-all ${
                                    isSelected ? 'bg-[#1a1a1a] text-white shadow-lg' : 'bg-white text-gray-600'
                                }`}>
                                <span className="text-[10px] font-medium opacity-60">{t.weekDays[i]}</span>
                                <span className="text-lg font-bold">{d.getDate()}</span>
                                {isToday && <div className={`w-1.5 h-1.5 rounded-full ${isSelected ? 'bg-[#D7FE63]' : 'bg-[#D7FE63]'}`} />}
                            </button>
                        );
                    })}
                </div>

                {/* Food List */}
                {todayFoods.length === 0 ? (
                    <div className="text-center py-16 animate-fadeIn">
                        <div className="text-5xl mb-4">🍽️</div>
                        <div className="text-gray-400 font-medium">{t.noFood}</div>
                        <div className="text-gray-300 text-sm mt-1">{t.tapToAdd}</div>
                    </div>
                ) : (
                    <div className="space-y-0">
                        {todayFoods.map((item, i) => {
                            const servingCals = Math.round(item.food.calories * item.food.serving / 100);
                            const servingCarbs = Math.round(item.food.carbs * item.food.serving / 100);
                            const servingProtein = Math.round(item.food.protein * item.food.serving / 100);
                            const servingFat = Math.round(item.food.fat * item.food.serving / 100);
                            const isHighCarb = carbLimit && servingCarbs > 30;
                            const isPortionAlert = carbLimit && servingCarbs > 20 && servingCarbs <= 30;

                            return (
                                <SwipeableItem key={item.id} onDelete={() => removeFood(item.id)}>
                                    <div className={`bg-white rounded-2xl p-4 shadow-sm animate-fadeIn ${isHighCarb ? 'ring-2 ring-red-200' : ''}`}
                                        style={{ animationDelay: `${i * 0.05}s` }}>
                                        <div className="flex items-center gap-3">
                                            <span className="text-3xl">{item.food.icon}</span>
                                            <div className="flex-1">
                                                <div className="flex items-center gap-2">
                                                    <span className="font-semibold text-gray-900">{item.food.name[lang]}</span>
                                                    {isHighCarb && (
                                                        <span className="text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded-full font-bold">{t.highCarbs}</span>
                                                    )}
                                                    {isPortionAlert && (
                                                        <span className="text-[10px] bg-yellow-100 text-yellow-600 px-2 py-0.5 rounded-full font-bold">{t.portionAlert}</span>
                                                    )}
                                                </div>
                                                <div className="flex items-center gap-3 mt-1">
                                                    <span className="text-xs text-gray-400">{servingCals} {t.kcal}</span>
                                                    <span className="text-xs text-blue-400">P: {servingProtein}{t.g}</span>
                                                    <span className="text-xs text-yellow-500">F: {servingFat}{t.g}</span>
                                                    <span className="text-xs text-green-500">C: {servingCarbs}{t.g}</span>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <div className="bg-gray-100 rounded-lg px-2 py-1">
                                                    <span className="text-[10px] text-gray-500 font-medium">{t.glycemicLoad}</span>
                                                    <span className="text-sm font-bold text-gray-700 ml-1">{item.food.gl}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </SwipeableItem>
                            );
                        })}
                    </div>
                )}

                {showSearch && <SearchOverlay onClose={() => setShowSearch(false)} onAdd={addFood} />}
            </div>
        );
    }

            fat: acc.fat + Math.round(item.food.fat * item.food.serving / 100),
            carbs: acc.carbs + Math.round(item.food.carbs * item.food.serving / 100),
        }), { calories: 0, protein: 0, fat: 0, carbs: 0 });

        const addWater = () => {
            const newWater = { ...waterLog };
            newWater[dateKey] = (newWater[dateKey] || 0) + 1;
            setWaterLog(newWater);
        };

        const removeWater = () => {
            const newWater = { ...waterLog };
            newWater[dateKey] = Math.max((newWater[dateKey] || 0) - 1, 0);
            setWaterLog(newWater);
        };

        const macroItems = [
            { label: t.calories, value: totals.calories, max: tdee, unit: t.kcal, color: '#D7FE63', bg: '#f0f9d6' },
            { label: t.protein, value: totals.protein, max: macros.protein, unit: t.g, color: '#60A5FA', bg: '#EFF6FF' },
            { label: t.fat, value: totals.fat, max: macros.fat, unit: t.g, color: '#FBBF24', bg: '#FFFBEB' },
            { label: t.carbs, value: totals.carbs, max: carbLimit, unit: t.g, color: '#34D399', bg: '#ECFDF5' },
        ];

        return (
            <div className="animate-fadeIn">
                <h1 className="text-2xl font-bold text-gray-900 mb-6">{t.analytics}</h1>

                {/* Macros */}
                <div className="bg-white rounded-3xl p-5 shadow-sm mb-4 animate-fadeIn stagger-1">
                    <h3 className="font-bold text-gray-900 mb-4">{t.macros}</h3>
                    <div className="space-y-4">
                        {macroItems.map(m => {
                            const pct = Math.min((m.value / m.max) * 100, 100);
                            return (
                                <div key={m.label}>
                                    <div className="flex justify-between mb-1.5">
                                        <span className="text-sm font-medium text-gray-700">{m.label}</span>
                                        <span className="text-sm font-bold text-gray-900">{m.value} / {m.max} {m.unit}</span>
                                    </div>
                                    <div className="h-3 rounded-full overflow-hidden" style={{ background: m.bg }}>
                                        <div className="h-full rounded-full transition-all duration-700"
                                            style={{ width: `${pct}%`, background: m.color }} />
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>

                {/* Water Tracker */}
                <div className="bg-white rounded-3xl p-5 shadow-sm animate-fadeIn stagger-2">
                    <div className="flex items-center justify-between mb-4">
                        <h3 className="font-bold text-gray-900">{t.water}</h3>
                        <span className="text-sm text-gray-400">{waterGlasses} / 8 {t.glasses}</span>
                    </div>
                    <div className="flex items-center gap-2 flex-wrap mb-4">
                        {Array.from({ length: 8 }).map((_, i) => (
                            <div key={i} className={`w-10 h-14 rounded-xl flex items-center justify-center text-xl transition-all duration-300 ${
                                i < waterGlasses ? 'bg-blue-100 scale-105' : 'bg-gray-50'
                            }`}>
                                {i < waterGlasses ? '💧' : '🫗'}
                            </div>
                        ))}
                    </div>
                    <div className="flex gap-3">
                        <button onClick={removeWater}
                            className="flex-1 bg-gray-100 text-gray-600 py-3 rounded-2xl font-semibold btn-press hover:bg-gray-200 transition-colors">
                            <i className="fa-solid fa-minus mr-2"></i>
                        </button>
                        <button onClick={addWater}
                            className="flex-1 bg-blue-500 text-white py-3 rounded-2xl font-semibold btn-press hover:bg-blue-600 transition-colors">
                            <i className="fa-solid fa-plus mr-2"></i>
                        </button>
                    </div>
                    <div className="h-2 bg-blue-50 rounded-full mt-4 overflow-hidden">
                        <div className="h-full bg-blue-400 rounded-full transition-all duration-500"
                            style={{ width: `${Math.min((waterGlasses / 8) * 100, 100)}%` }} />
                    </div>
                </div>
            </div>
        );
    }

    // ==================== Settings Screen ====================
    function SettingsScreen() {
        const { profile, setProfile, lang, setLang, resetApp } = useContext(AppContext);
        const t = translations[lang];
        const [editing, setEditing] = useState(false);
        const [editData, setEditData] = useState({ ...profile });
        const [showConfirm, setShowConfirm] = useState(false);

        const saveProfile = () => {
            setProfile(editData);
            setEditing(false);
        };

        const toggleDietMode = () => {
            const newMode = profile.dietMode === 'standard' ? 'carbControl' : 'standard';
            setProfile({ ...profile, dietMode: newMode });
        };

        return (
            <div className="animate-fadeIn">
                <h1 className="text-2xl font-bold text-gray-900 mb-6">{t.settings}</h1>

                {/* Profile Card */}
                <div className="bg-white rounded-3xl p-5 shadow-sm mb-4 animate-fadeIn stagger-1">
                    <div className="flex items-center gap-4 mb-4">
                        <div className="w-16 h-16 bg-[#D7FE63] rounded-2xl flex items-center justify-center text-2xl font-bold text-gray-900">
                            {profile.name.charAt(0).toUpperCase()}
                        </div>
                        <div>
                            <div className="font-bold text-lg text-gray-900">{profile.name}</div>
                            <div className="text-sm text-gray-400">{profile.age} y/o · {profile.weight}kg · {profile.height}cm</div>
                        </div>
                    </div>
                    {!editing ? (
                        <button onClick={() => { setEditData({ ...profile }); setEditing(true); }}
                            className="w-full bg-gray-100 text-gray-700 py-3 rounded-2xl font-semibold btn-press hover:bg-gray-200 transition-colors">
                            <i className="fa-solid fa-pen mr-2"></i>{t.editProfile}
                        </button>
                    ) : (
                        <div className="space-y-3 animate-fadeIn">
                            <input type="text" value={editData.name} onChange={e => setEditData({ ...editData, name: e.target.value })}
                                className="w-full bg-gray-50 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-[#D7FE63]" />
                            <div className="grid grid-cols-3 gap-2">
                                <div>
                                    <label className="text-xs text-gray-400">{t.age}</label>
                                    <input type="number" value={editData.age} onChange={e => setEditData({ ...editData, age: parseInt(e.target.value) || 0 })}
                                        className="w-full bg-gray-50 rounded-xl px-3 py-2 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-[#D7FE63]" />
                                </div>
                                <div>
                                    <label className="text-xs text-gray-400">{t.weight}</label>
                                    <input type="number" value={editData.weight} onChange={e => setEditData({ ...editData, weight: parseInt(e.target.value) || 0 })}
                                        className="w-full bg-gray-50 rounded-xl px-3 py-2 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-[#D7FE63]" />
                                </div>
                                <div>
                                    <label className="text-xs text-gray-400">{t.height}</label>
                                    <input type="number" value={editData.height} onChange={e => setEditData({ ...editData, height: parseInt(e.target.value) || 0 })}
                                        className="w-full bg-gray-50 rounded-xl px-3 py-2 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-[#D7FE63]" />
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setEditing(false)}
                                    className="flex-1 bg-gray-100 text-gray-600 py-3 rounded-2xl font-semibold btn-press">{t.cancel}</button>
                                <button onClick={saveProfile}
                                    className="flex-1 bg-[#D7FE63] text-gray-900 py-3 rounded-2xl font-semibold btn-press">{t.save}</button>
                            </div>
                        </div>
                    )}
                </div>

                {/* Diet Mode Toggle */}
                <div className="bg-white rounded-3xl p-5 shadow-sm mb-4 animate-fadeIn stagger-2">
                    <h3 className="font-bold text-gray-900 mb-3">{t.dietMode}</h3>
                    <div className="flex gap-3">
                        <button onClick={() => setProfile({ ...profile, dietMode: 'standard' })}
                            className={`flex-1 py-3 px-4 rounded-2xl font-medium text-sm btn-press transition-all ${
                                profile.dietMode === 'standard' ? 'bg-[#D7FE63] text-gray-900 shadow-md' : 'bg-gray-100 text-gray-500'
                            }`}>
                            🥗 {t.standard}
                        </button>
                        <button onClick={() => setProfile({ ...profile, dietMode: 'carbControl' })}
                            className={`flex-1 py-3 px-4 rounded-2xl font-medium text-sm btn-press transition-all ${
                                profile.dietMode === 'carbControl' ? 'bg-[#D1F0ED] text-teal-700 shadow-md' : 'bg-gray-100 text-gray-500'
                            }`}>
                            🩺 {t.carbControl}
                        </button>
                    </div>
                </div>

                {/* Language */}
                <div className="bg-white rounded-3xl p-5 shadow-sm mb-4 animate-fadeIn stagger-3">
                    <h3 className="font-bold text-gray-900 mb-3">{t.language}</h3>
                    <div className="flex gap-2">
                        {[{code:'en',label:'English',flag:'🇬🇧'},{code:'ru',label:'Русский',flag:'🇷🇺'},{code:'kk',label:'Қазақша',flag:'🇰🇿'}].map(l => (
                            <button key={l.code} onClick={() => setLang(l.code)}
                                className={`flex-1 py-3 rounded-2xl font-medium text-sm btn-press transition-all flex flex-col items-center gap-1 ${
                                    lang === l.code ? 'bg-[#D7FE63] text-gray-900 shadow-md' : 'bg-gray-100 text-gray-500'
                                }`}>
                                <span className="text-lg">{l.flag}</span>
                                <span className="text-xs">{l.label}</span>
                            </button>
                        ))}
                    </div>
                </div>

                {/* Reset */}
                <button onClick={() => setShowConfirm(true)}
                    className="w-full bg-red-50 text-red-500 py-4 rounded-2xl font-semibold btn-press hover:bg-red-100 transition-colors animate-fadeIn stagger-4">
                    <i className="fa-solid fa-trash mr-2"></i>{t.resetData}
                </button>

                {showConfirm && (
                    <div className="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-6 animate-fadeIn">
                        <div className="bg-white rounded-3xl p-6 w-full max-w-sm animate-scaleIn">
                            <p className="text-gray-900 font-semibold text-center mb-6">{t.confirmReset}</p>
                            <div className="flex gap-3">
                                <button onClick={() => setShowConfirm(false)}
                                    className="flex-1 bg-gray-100 text-gray-600 py-3 rounded-2xl font-semibold btn-press">{t.no}</button>
                                <button onClick={() => { resetApp(); setShowConfirm(false); }}
                                    className="flex-1 bg-red-500 text-white py-3 rounded-2xl font-semibold btn-press">{t.yes}</button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    // ==================== Bottom Navigation ====================
    function BottomNav({ activeTab, setActiveTab }) {
        const { lang } = useContext(AppContext);
        const t = translations[lang];
        const tabs = [
            { id: 'dashboard', icon: 'fa-house', label: t.dashboard },
            { id: 'tracker', icon: 'fa-utensils', label: t.tracker },
            { id: 'analytics', icon: 'fa-chart-simple', label: t.analytics },
            { id: 'settings', icon: 'fa-gear', label: t.settings },
        ];

        return (
            <div className="fixed bottom-0 left-0 right-0 z-40">
                <div className="max-w-[430px] mx-auto">
                    <div className="glass-card border-t border-gray-100 px-2 py-2 flex justify-around">
                        {tabs.map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                className={`nav-item flex flex-col items-center py-2 px-4 rounded-2xl btn-press ${
                                    activeTab === tab.id ? 'active' : 'text-gray-400'
                                }`}>
                                <i className={`fa-solid ${tab.icon} text-lg mb-1`}></i>
                                <span className="text-[10px] font-semibold">{tab.label}</span>
                                <div className={`nav-dot w-5 h-1 bg-[#D7FE63] rounded-full mt-1`}></div>
                            </button>
                        ))}
                    </div>
                </div>
            </div>
        );
    }

    // ==================== Main App ====================
    function App() {
        const [isOnboarded, setIsOnboarded] = useState(() => {
            try { return !!localStorage.getItem('wellai_profile'); } catch { return false; }
        });
        const [profile, setProfileState] = useState(() => {
            try {
                const saved = localStorage.getItem('wellai_profile');
                return saved ? JSON.parse(saved) : null;
            } catch { return null; }
        });
        const [foodLog, setFoodLogState] = useState(() => {
            try {
                const saved = localStorage.getItem('wellai_foodlog');
                return saved ? JSON.parse(saved) : {};
            } catch { return {}; }
        });
        const [waterLog, setWaterLogState] = useState(() => {
            try {
                const saved = localStorage.getItem('wellai_waterlog');
                return saved ? JSON.parse(saved) : {};
            } catch { return {}; }
        });
        const [lang, setLangState] = useState(() => {
            try { return localStorage.getItem('wellai_lang') || 'en'; } catch { return 'en'; }
        });
        const [activeTab, setActiveTab] = useState('dashboard');
        const [selectedDate, setSelectedDate] = useState(new Date());

        const setProfile = (p) => {
            setProfileState(p);
            try { localStorage.setItem('wellai_profile', JSON.stringify(p)); } catch {}
        };
        const setFoodLog = (log) => {
            setFoodLogState(log);
            try { localStorage.setItem('wellai_foodlog', JSON.stringify(log)); } catch {}
        };
        const setWaterLog = (log) => {
            setWaterLogState(log);
            try { localStorage.setItem('wellai_waterlog', JSON.stringify(log)); } catch {}
        };
        const setLang = (l) => {
            setLangState(l);
            try { localStorage.setItem('wellai_lang', l); } catch {}
        };

        const handleOnboardingComplete = (profileData) => {
            setProfile(profileData);
            setIsOnboarded(true);
        };

        const resetApp = () => {
            try {
                localStorage.removeItem('wellai_profile');
                localStorage.removeItem('wellai_foodlog');
                localStorage.removeItem('wellai_waterlog');
            } catch {}
            setProfileState(null);
            setFoodLogState({});
            setWaterLogState({});
            setIsOnboarded(false);
        };

        const contextValue = {
            profile, setProfile, foodLog, setFoodLog, waterLog, setWaterLog,
            lang, setLang, selectedDate, setSelectedDate, resetApp
        };

        if (!isOnboarded || !profile) {
            return (
                <AppContext.Provider value={contextValue}>
                    <Onboarding onComplete={handleOnboardingComplete} />
                </AppContext.Provider>
            );
        }

        const renderScreen = () => {
            switch (activeTab) {
                case 'dashboard': return <DashboardScreen />;
                case 'tracker': return <TrackerScreen />;
                case 'analytics': return <AnalyticsScreen />;
                case 'settings': return <SettingsScreen />;
                default: return <DashboardScreen />;
            }
        };

        return (
            <AppContext.Provider value={contextValue}>
                <div className="max-w-[430px] mx-auto min-h-screen bg-[#F8F9FB]">
                    <div className="px-5 pt-6 pb-28 overflow-y-auto hide-scrollbar" style={{ minHeight: '100vh' }}>
                        {renderScreen()}
                    </div>
                    <BottomNav activeTab={activeTab} setActiveTab={setActiveTab} />
                </div>
            </AppContext.Provider>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
